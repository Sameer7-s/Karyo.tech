<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="KARYO® — Premium AI agency and creative studio. We design, build, and scale digital products with AI automation, branding, and full-stack development." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="KARYO® — Creative Studio" />
    <meta property="og:description" content="Premium AI agency and creative studio. We design, build, and scale digital products." />
    <meta property="og:url" content="https://karyo.tech" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KARYO® — Creative Studio" />
    <meta name="twitter:description" content="Premium AI agency and creative studio. Build. Automate. Scale." />

    <title>KARYO® — Creative Studio</title>

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts with display=swap for instant text rendering -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- DNS prefetch for image CDNs -->
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://picsum.photos" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
